name: .NET Test

on:
  push:
    branches: [main]
    paths:
      - 'src/**/*.cs'
      - 'src/**/*.csproj'
      - 'tests/**/*.cs'
      - 'tests/**/*.csproj'
      - '**/*.props'
      - '**/*.targets'
      - '*.slnx'
      - 'global.json'
      - 'nuget.config'
      - '.github/workflows/dotnet-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**/*.cs'
      - 'src/**/*.csproj'
      - 'tests/**/*.cs'
      - 'tests/**/*.csproj'
      - '**/*.props'
      - '**/*.targets'
      - '*.slnx'
      - 'global.json'
      - 'nuget.config'
      - '.github/workflows/dotnet-test.yml'

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Install .NET HTTPS Development Certificate
        run: |
          dotnet tool update -g linux-dev-certs
          dotnet linux-dev-certs install

      - name: Restore
        run: dotnet restore PokemonTools.slnx

      - name: Build
        run: dotnet build PokemonTools.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --results-directory TestResults --report-xunit-trx

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/**/*.trx

      - name: Test Report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Test Results
          path: TestResults/**/*.trx
          reporter: dotnet-trx
